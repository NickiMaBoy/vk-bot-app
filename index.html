<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 10px; margin: 10px; }
    </style>
</head>
<body>
    <h2>Личный кабинет</h2>
    <div class="card" id="user-info">Загрузка данных...</div>

    <script>
        // Инициализация моста
        vkBridge.send('VKWebAppInit');

        // Получаем данные о пользователе напрямую от платформы ВК
        vkBridge.send('VKWebAppGetUserInfo').then((data) => {
            document.getElementById('user-info').innerText = "Твой ID в системе: " + data.id;
        }).catch((error) => {
            document.getElementById('user-info').innerText = "Ошибка получения данных: " + error.error_data.error_reason;
        });
    </script>
</body>
</html>
