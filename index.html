<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 15px; margin: 20px auto; max-width: 300px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Личный кабинет</h2>
        <div id="user-info">Загрузка...</div>
        <div id="balance">Баланс: 0 баллов</div>
        <button onclick="addPoints()">💰 Заработать 10 баллов</button>
    </div>

    <script>
        vkBridge.send('VKWebAppInit');
        
        vkBridge.send('VKWebAppGetUserInfo').then((data) => {
            document.getElementById('user-info').innerText = "Привет, " + data.first_name;
        });

        function addPoints() {
            alert("Кнопка нажата! Чтобы баллы реально начислялись, нужно подключить серверную часть (Flask).");
        }
    </script>
</body>
</html>
