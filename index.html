<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
    <h2 id="status">Загрузка...</h2>
    
    <script>
        const status = document.getElementById('status');
        vkBridge.send('VKWebAppInit');

        vkBridge.send('VKWebAppGetAuthToken', {
            app_id: 54649157, 
            scope: 'friends'
        }).then((data) => {
            // ВМЕСТО ПЕРЕНАПРАВЛЕНИЯ — показываем токен пользователю
            status.innerHTML = `
                <p>✅ Авторизация успешна!</p>
                <p>Скопируй этот текст и отправь боту:</p>
                <textarea readonly style="width:90%; height:50px;">set_token:${data.access_token}</textarea>
                <p>После отправки бот тебя активирует.</p>
            `;
        }).catch((error) => {
            status.innerText = "Ошибка авторизации: " + error.error_data.error_reason;
        });
    </script>
</body>
</html>
