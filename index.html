<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
    <h2 id="status">Авторизация...</h2>
    <script>
        vkBridge.send('VKWebAppInit');

        // Просто получаем информацию, чтобы ВК «понял», что пользователь активен
        vkBridge.send('VKWebAppGetUserInfo').then((user) => {
            document.getElementById('status').innerText = "✅ Авторизация успешна! Можете вернуться в диалог с ботом.";
            
            // Закрываем приложение, чтобы не висел "замкнутый круг"
            setTimeout(() => {
                vkBridge.send('VKWebAppClose', { status: 'success' });
            }, 2000);
        });
    </script>
</body>
</html>
