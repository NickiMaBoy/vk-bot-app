<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
    <h2>Авторизация...</h2>
    <script>
        vkBridge.send('VKWebAppInit');

        // Получаем ID пользователя и сразу перекидываем его обратно в бота
        vkBridge.send('VKWebAppGetUserInfo').then((user) => {
            // Переход обратно в диалог с ботом с командой "auth" и ID пользователя
            window.location.href = "https://vk.com/im?sel=-239776091&text=auth_" + user.id;
        });
    </script>
</body>
</html>
